<div class="stat" [class.drought]="note?.includes('area')">
  <div class="stat-label">{{ label }}</div>
  <div class="stat-value">
    <span class="main-value">{{ value }}</span>
    <span *ngIf="percent" class="percent-value">{{ percent }}</span>
    <span *ngIf="note" class="stat-note-inline">{{ note }}</span>
  </div>
</div>
