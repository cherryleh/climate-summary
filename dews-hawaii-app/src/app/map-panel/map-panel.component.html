<div class="map">
  <svg #mapSvg [attr.viewBox]="viewBox" class="map-svg" role="img" aria-label="Hawaiʻi islands (abstract)" style="transition: all 0.4s ease;">
    <defs>
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="3" result="blur" />
        <feMerge>
          <feMergeNode in="blur" />
          <feMergeNode in="SourceGraphic" />
        </feMerge>
      </filter>
      <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
        <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(0,0,0,0.05)" stroke-width="1" />
      </pattern>
    </defs>

    <g class="map-content">
      <rect x="0" y="0" width="560" height="320" fill="url(#grid)" />

      <image
        *ngIf="rasterHref && rasterRect"
        [attr.href]="rasterHref"
        [attr.x]="rasterRect.x"
        [attr.y]="rasterRect.y"
        [attr.width]="rasterRect.width"
        [attr.height]="rasterRect.height"
        preserveAspectRatio="none"
        style="pointer-events:none; image-rendering: pixelated;"
        opacity="0.9"
      />

      <path
        *ngFor="let feature of islands; trackBy: trackByIsle"
        [attr.d]="pathById[feature.id]"
        [attr.data-key]="feature.key"
        [attr.fill]="fillColor(feature)"
        stroke="#9ca3af"
        stroke-width="1"
        (click)="viewMode === 'islands' ? pickIsland(feature.name) : pickDivision(feature.key)"
        (mouseenter)="onHover(feature, $event)"
        (mouseleave)="onLeave()"
      ></path>

      <!-- Selected/hovered highlight rendered on top of all boundary lines -->
      <ng-container *ngFor="let feature of islands; trackBy: trackByIsle">
        <path
          *ngIf="(viewMode === 'divisions' && selectedDivision === feature.key) || (viewMode === 'islands' && selectedIsland === feature.name) || hoveredFeature() === feature.name"
          [attr.d]="pathById[feature.id]"
          [attr.data-key]="feature.key"
          fill="none"
          [attr.stroke]="strokeColor(feature)"
          [attr.stroke-width]="strokeWidth(feature)"
          [attr.filter]="filterGlow(feature)"
          style="pointer-events: none;"
        ></path>
      </ng-container>

      <g class="labels">
        <g *ngIf="viewMode === 'divisions' && (selectedScope === 'ahupuaa' || selectedScope === 'watershed') && hoveredLabel() as hl">
          <text
            [attr.x]="hl.x"
            [attr.y]="hl.y - 6"
            text-anchor="middle"
            class="ahupuaa-label"
          >
            {{ hl.name }}
          </text>
        </g>

        <ng-container *ngFor="let feature of islands; trackBy: trackByIsle">
          <ng-container *ngIf="centroidById[feature.id] as c">
            <text
              *ngIf="!(viewMode === 'divisions' && (selectedScope === 'ahupuaa' || selectedScope === 'watershed'))"
              [attr.x]="c[0]"
              [attr.y]="c[1] + 12"
              text-anchor="middle"
              class="island-label"
            >
              {{ feature.short }}
            </text>
          </ng-container>
        </ng-container>
      </g>
    </g>
  </svg>

  <!-- Inset overview box shown when zoomed in -->
  <svg *ngIf="isZoomed" class="inset-map" viewBox="-30 -5 490 320" aria-hidden="true">
    <path
      *ngFor="let feature of islands; trackBy: trackByIsle"
      [attr.d]="pathById[feature.id]"
      fill="rgba(200,220,240,0.5)"
      stroke="#9ca3af"
      stroke-width="1"
    ></path>
    <rect
      *ngIf="zoomedRect as r"
      [attr.x]="r.x"
      [attr.y]="r.y"
      [attr.width]="r.width"
      [attr.height]="r.height"
      fill="rgba(14,165,233,0.15)"
      stroke="#0ea5e9"
      stroke-width="3"
    ></rect>
  </svg>

  <div class="selection-overlay">
    <div class="map-title" *ngIf="mapTitle">{{ mapTitle }}</div>
    <div class="eyebrow">Selection:</div>
    <div class="main">
      {{ selectionLabel || 'Statewide' }}
    </div>

    <div class="disclaimer" *ngIf="isMultiIslandDivision">
      * This climate division spans multiple islands.
    </div>
  </div>

  <div class="colorbar legend" *ngIf="rasterHref">
    <div class="colorbar-wrap">
      <canvas id="colorbarCanvas" width="20" height="150" *ngIf="selectedDataset !== 'Drought'"></canvas>
      <div id="colorbarLegend"></div>
    </div>
  </div>
</div>
